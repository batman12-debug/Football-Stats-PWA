# CheckBoard — Netlify deploys the Next.js app from frontend/
# IMPORTANT: Connect GitHub/GitLab (not drag-and-drop). Next.js has no index.html.
#
# Netlify UI (Site configuration → Build & deploy → Continuous deployment → Build settings):
#   Base directory:     LEAVE EMPTY (this file sets base = "frontend")
#   Build command:      LEAVE EMPTY (read from here)
#   Publish directory:  LEAVE EMPTY (this file sets publish = ".next")
# If Base or Publish are set in the UI, they OVERRIDE this file and the Next.js plugin will fail.

[build]
  base = "frontend"
  command = "npm ci && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NPM_CONFIG_FUND = "false"
  NPM_CONFIG_AUDIT = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]
  included_files = ["app/fonts/**"]

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
