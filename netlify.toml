# GoalMind — Netlify deploys the Next.js app from frontend/
# IMPORTANT: Connect GitHub/GitLab (not drag-and-drop). Next.js has no index.html.
#
# Netlify UI (when importing repo):
#   Base directory: leave empty (this file sets base = "frontend")
#   Build command:   leave empty (read from here)
#   Publish directory: leave empty (@netlify/plugin-nextjs sets output)

[build]
  base = "frontend"
  command = "npm ci && npm run build"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NPM_CONFIG_FUND = "false"
  NPM_CONFIG_AUDIT = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["sharp"]
  included_files = ["app/fonts/**"]

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=86400"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
